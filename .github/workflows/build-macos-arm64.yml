name: Build NoGuard (macOS arm64)

# Builds an unsigned NoGuard.app for Apple Silicon and uploads it as an artifact
# (and attaches it to a release when the workflow is triggered by a tag).
#
# macOS builds cannot be cross-compiled from Linux, so this runs on a native
# arm64 macOS runner (macos-14 / macos-15 are Apple Silicon).

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm install
        env:
          npm_config_build_from_source: "true"

      - name: Build React UI
        run: npm run buildreact
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Compile
        run: npm run compile

      - name: Gulp package (darwin-arm64)
        run: npm run gulp vscode-darwin-arm64
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      # The gulp task outputs ../VSCode-darwin-arm64/ next to the repo checkout.
      - name: Locate app bundle
        id: locate
        run: |
          APP_DIR="$(cd .. && pwd)/VSCode-darwin-arm64"
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"
          ls -la "$APP_DIR"

      - name: Create DMG
        run: |
          APP_DIR="${{ steps.locate.outputs.app_dir }}"
          APP_NAME="$(ls "$APP_DIR" | grep '\.app$' | head -n1)"
          echo "Packaging $APP_NAME"
          # Ad-hoc sign so Gatekeeper allows right-click -> Open without a dev account
          codesign --force --deep --sign - "$APP_DIR/$APP_NAME" || true
          mkdir -p dist
          hdiutil create -volname "NoGuard" \
            -srcfolder "$APP_DIR/$APP_NAME" \
            -ov -format UDZO \
            "dist/NoGuard-darwin-arm64.dmg"
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoGuard-darwin-arm64
          path: dist/NoGuard-darwin-arm64.dmg
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NoGuard-darwin-arm64.dmg
